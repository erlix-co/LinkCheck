name: Android Debug APK

on:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm install --no-audit --no-fund
        working-directory: mobile

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund
        working-directory: frontend

      - name: Build web and sync Android assets
        shell: bash
        run: |
          set -o pipefail
          echo "PWD=$(pwd)"
          echo "Node=$(node -v)"
          echo "NPM=$(npm -v)"
          ls -la
          ls -la frontend
          ls -la mobile
          npm run build:web --prefix mobile 2>&1 | tee mobile-build.log
          npm run sync --prefix mobile 2>&1 | tee -a mobile-build.log
        working-directory: mobile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: mobile/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkcheck-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload mobile build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build-log
          path: mobile-build.log
          if-no-files-found: ignore
