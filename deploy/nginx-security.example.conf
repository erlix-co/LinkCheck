# Example snippets — harden a reverse proxy in front of LinkCheck.
# Flask does not expose .env or backend/data as static files by default; these rules
# protect against misconfiguration (e.g. wrong document root or accidental static mapping).

# Block hidden/sensitive path patterns if the server also serves static files:
# location ~ /\.(env|git) {
#     deny all;
#     return 404;
# }

# Do not map the project repository or backend folder as a public web root.
# Serve only: frontend/dist (or CDN) for HTML/JS/CSS, and proxy / to the API host as needed.

# TLS: terminate HTTPS at the proxy; set HSTS there or use FORCE_HSTS on the app behind HTTPS.
